apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentbus.fullname" . }}
  labels:
    {{- include "agentbus.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: tcp
      port: {{ .Values.service.tcpPort }}
      targetPort: tcp
      protocol: TCP
      appProtocol: tcp
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      # gRPC clients (envoy, contour, etc.) use appProtocol for routing.
      appProtocol: grpc
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      appProtocol: http
  selector:
    {{- include "agentbus.selectorLabels" . | nindent 4 }}
