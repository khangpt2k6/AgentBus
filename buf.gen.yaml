version: v2
plugins:
  # Pin plugin versions so CI regen exactly reproduces the committed files.
  # To upgrade: bump the version, run `buf generate`, and commit the proto/ diff.
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: proto
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.6.1
    out: proto
    opt: paths=source_relative
