name: Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/chart.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'deploy/helm/**'

permissions:
  contents: read
  packages: write

env:
  CHART_PATH: deploy/helm/agentbus
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: helm lint
        run: helm lint ${{ env.CHART_PATH }} --strict
      - name: helm template (default values)
        run: helm template agentbus ${{ env.CHART_PATH }} > /tmp/manifests-default.yaml
      - name: helm template (persistence enabled, serviceMonitor on)
        run: |
          helm template agentbus ${{ env.CHART_PATH }} \
            --set persistence.enabled=true \
            --set persistence.size=50Gi \
            --set serviceMonitor.enabled=true \
            --set otel.enabled=true \
            --set otel.endpoint=otel-collector:4317 \
            > /tmp/manifests-full.yaml
      - name: kubeconform (validate k8s manifests)
        run: |
          curl -sSfL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz kubeconform
          ./kubeconform -strict -summary -ignore-missing-schemas /tmp/manifests-default.yaml
          ./kubeconform -strict -summary -ignore-missing-schemas /tmp/manifests-full.yaml

  publish:
    name: Publish to GHCR (OCI)
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      - name: Resolve version
        id: ver
        run: |
          # Tag like v0.4.0 -> chart version 0.4.0. Chart.yaml's version
          # may diverge from the broker AppVersion; we override both here
          # so chart releases track repo tags.
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Package chart
        run: |
          helm package ${{ env.CHART_PATH }} \
            --version ${{ steps.ver.outputs.version }} \
            --app-version ${{ steps.ver.outputs.version }} \
            -d dist
      - name: Push chart to GHCR
        run: |
          helm push dist/agentbus-${{ steps.ver.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
