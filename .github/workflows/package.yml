name: Package (snapshot)

# Dry-run of the release pipeline. Builds all binaries and the Docker image
# locally without publishing anything. Useful for verifying release config
# before tagging.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.goreleaser.yml'
      - 'docker/broker.goreleaser.Dockerfile'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    name: GoReleaser snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run GoReleaser (snapshot, no publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=publish

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goqueue-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 7
