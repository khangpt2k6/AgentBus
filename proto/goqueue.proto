syntax = "proto3";

package goqueue.v1;

option go_package = "github.com/khangpt2k6/AgentBus/proto;goqueuev1";

service BrokerService {
  rpc Publish(PublishRequest) returns (PublishResponse);
  rpc Consume(ConsumeRequest) returns (stream ConsumeMessage);
  // Fetch returns historical messages starting at from_offset. Unlike Consume,
  // it does not track consumer-group state and does not stream — it returns a
  // single page. Use it for session replay, debugging, and time-travel reads.
  rpc Fetch(FetchRequest) returns (FetchResponse);
}

message PublishRequest {
  string topic = 1;
  bytes payload = 2;
  string key = 3;
  int32 partition = 4;
}

message PublishResponse {
  int64 offset = 1;
  int32 partition = 2;
}

message ConsumeRequest {
  string topic = 1;
  string group = 2;
  int32 partition = 3;
}

message ConsumeMessage {
  int64 offset = 1;
  bytes payload = 2;
  int64 timestamp_unix_nano = 3;
  int32 partition = 4;
}

message FetchRequest {
  string topic = 1;
  int32 partition = 2;
  int64 from_offset = 3;
  // Maximum messages to return. Server caps at 4096.
  int32 max_count = 4;
  // Optional server-side filter. When set, the broker decodes each
  // candidate message as an agent envelope and returns only matches.
  // Reduces wire bytes drastically for session replay on busy topics.
  // Note: filtering decodes JSON server-side, so it costs CPU per
  // scanned message; broker may scan up to scan_limit messages to
  // produce one page of matches.
  SessionFilter session_filter = 5;
  // Hard upper bound on messages the broker will scan to fill the
  // requested max_count. Default 16384, max 65536. Has no effect when
  // session_filter is absent.
  int32 scan_limit = 6;
}

// SessionFilter selects events whose envelope matches the given triple.
// All non-empty fields must match (logical AND). Empty fields are wildcards.
message SessionFilter {
  string tenant = 1;
  string project = 2;
  string session_id = 3;
}

message FetchResponse {
  repeated ConsumeMessage messages = 1;
  // next_offset is the offset to pass on the next page to continue reading.
  // Equals from_offset + len(messages) on success.
  int64 next_offset = 2;
  // head is the oldest offset still retained for this partition (older
  // messages have been evicted from the ring buffer).
  int64 head = 3;
  // tail is the next-write offset (one past the latest persisted message).
  int64 tail = 4;
}
